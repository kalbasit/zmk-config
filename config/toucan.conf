# When the keyboard halves are placed on opposite sides of the body, the right
# side can have trouble connecting to the left.  Increasing TX power and
# enabling experimental BLE features resolves the issue:
# https://github.com/zmkfirmware/zmk/issues/916#issuecomment-1943816527
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

# 4 Bluetooth profiles.  Set to n+1 because the central also holds a connection
# to the peripheral half.
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5

# Cirque trackpad support.
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# Battery reporting (both halves report; proxy is central-only, see toucan_left.conf).
CONFIG_ZMK_BATTERY_REPORTING=y

# Power management — required for Cirque driver sleep notifications.
# SOFT_OFF implies ZMK_PM, PM_DEVICE and ZMK_PM_DEVICE_SUSPEND_RESUME.
CONFIG_ZMK_PM_SOFT_OFF=y

# Deep sleep after 60 minutes.  15 min default causes reconnect annoyance with
# negligible extra power draw from the longer timeout.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# Regular idle timeout (30 s default).  Cuts Cirque active current
# 1.7 mA vs 2.9 mA; touchpad wakes in ~300 ms on next press.
CONFIG_ZMK_IDLE_TIMEOUT=30000
