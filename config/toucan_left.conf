# Temporary: USB logging to diagnose right-half split disconnections.
# Remove once root cause is identified.
CONFIG_ZMK_USB_LOGGING=y

# Silence noisy trackpad/input debug output so BLE disconnect events aren't
# dropped from the log buffer (~500 msgs/sec during trackpad use causes 346+
# overflow events, swamping the disconnect callback message).
CONFIG_INPUT_LOG_LEVEL_WRN=y

# Larger log buffer to absorb bursts without dropping critical BLE messages.
CONFIG_LOG_BUFFER_SIZE=8192
